name: Sync Drive Content

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate pages from Drive structure
        run: npm run generate

      - name: Commit Drive content to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/drive/
          if git diff --staged --quiet; then
            echo "No Drive content changes to commit."
          else
            git commit -m "chore: sync Drive content [skip ci]"
            git push
          fi

  deploy:
    needs: sync
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
